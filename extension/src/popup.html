<!doctype html>
<meta charset="utf-8">
<title>Video Overlay Translator</title>
<style>
  body { width: 320px; padding: 12px 14px; font: 13px system-ui, sans-serif; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 10px 0; }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; gap: 8px; }
  .label { color: #6b7280; font-size: 12px; flex-shrink: 0; }
  .value { font-family: ui-monospace, monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .status-on { color: #16a34a; font-weight: 600; }
  .status-off { color: #9ca3af; }
  .status-warn { color: #d97706; }
  .preview { background: #f3f4f6; padding: 8px 10px; border-radius: 4px; margin-top: 10px; min-height: 2em; font-size: 12px; line-height: 1.4; }
  .last { color: #9ca3af; font-size: 11px; margin-top: 4px; font-style: italic; min-height: 1em; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }
  button { flex: 1; padding: 8px; cursor: pointer; font: inherit; }
  .primary { background: #16a34a; color: white; border: none; border-radius: 4px; }
  .danger { background: #dc2626; color: white; border: none; border-radius: 4px; }
  .secondary { background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; flex: 0 0 auto; padding: 8px 12px; }
</style>
<h1>Video Overlay Translator</h1>
<div class="row"><span class="label">Status</span><span class="value" id="status">…</span></div>
<div class="row"><span class="label">Spark</span><span class="value" id="host">—</span></div>
<div class="row"><span class="label">Model</span><span class="value" id="model">—</span></div>
<div class="preview" id="lastText">(latest translation will appear here)</div>
<div class="last" id="lastUpdate"></div>
<div class="actions">
  <button id="toggle" class="primary">Start</button>
  <button id="restart" class="secondary" title="Restart translation (re-open WSS)" hidden>↻</button>
  <button id="settings" class="secondary" title="Settings">⚙</button>
</div>
<script src="popup.js"></script>
